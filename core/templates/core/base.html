<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resilience System{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}

    <!-- Prevent double submit: disable buttons on form submit, re-enable if form doesn't navigate away -->
    <script>
    (function() {
        function init() {
            document.body.addEventListener('submit', function(e) {
                var form = e.target;
                if (form.tagName !== 'FORM') return;
                var buttons = form.querySelectorAll('button[type="submit"], input[type="submit"]');
                var disabledList = [];
                buttons.forEach(function(btn) {
                    if (btn.disabled) return;
                    btn.disabled = true;
                    if (btn.tagName === 'BUTTON' && btn.dataset.disableText) {
                        btn.dataset.originalText = btn.innerHTML;
                        btn.innerHTML = btn.dataset.disableText;
                    }
                    disabledList.push(btn);
                });
                setTimeout(function() {
                    disabledList.forEach(function(btn) {
                        if (btn && btn.parentNode) {
                            btn.disabled = false;
                            if (btn.dataset.originalText) {
                                btn.innerHTML = btn.dataset.originalText;
                                delete btn.dataset.originalText;
                            }
                        }
                    });
                }, 4000);
            });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
    {% block extra_js %}{% endblock %}
    
    <!-- Logout Confirmation Script - Available on all pages when logged in -->
    {% if user.is_authenticated or request.session.user_credentials_id %}
    <script>
    function confirmLogout() {
        // Create confirmation modal
        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        `;
        
        const modalContent = document.createElement('div');
        modalContent.style.cssText = `
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        `;
        
        modalContent.innerHTML = `
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <div style="
                    width: 64px;
                    height: 64px;
                    margin: 0 auto 1rem;
                    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                ">
                    <i class="fa-solid fa-sign-out-alt" style="font-size: 2rem; color: #ef4444;"></i>
                </div>
                <h3 style="margin: 0 0 0.5rem 0; font-size: 1.5rem; font-weight: 600; color: #212529;">Confirm Logout</h3>
                <p style="margin: 0; color: #6c757d; font-size: 1rem;">Are you sure you want to logout?</p>
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button type="button" onclick="closeLogoutModal()" style="
                    padding: 0.75rem 1.5rem;
                    background: #f8f9fa;
                    color: #495057;
                    border: 1px solid #dee2e6;
                    border-radius: 8px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: background 0.2s ease;
                " onmouseover="this.style.background='#e9ecef'" onmouseout="this.style.background='#f8f9fa'">
                    Cancel
                </button>
                <button type="button" onclick="performLogout()" style="
                    padding: 0.75rem 1.5rem;
                    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-weight: 600;
                    cursor: pointer;
                    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(239, 68, 68, 0.4)'" 
                   onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(239, 68, 68, 0.3)'">
                    <i class="fa-solid fa-sign-out-alt" style="margin-right: 0.5rem;"></i>Logout
                </button>
            </div>
        `;
        
        modal.appendChild(modalContent);
        document.body.appendChild(modal);
        
        // Close modal when clicking outside
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeLogoutModal();
            }
        });
        
        // Store modal reference for cleanup
        window.currentLogoutModal = modal;
    }
    
    function closeLogoutModal() {
        if (window.currentLogoutModal) {
            window.currentLogoutModal.remove();
            window.currentLogoutModal = null;
        }
    }
    
    function performLogout() {
        // Redirect to logout URL
        window.location.href = "{% url 'logout' %}";
    }
    </script>
    {% endif %}
</body>
</html>
