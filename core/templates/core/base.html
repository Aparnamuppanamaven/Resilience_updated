<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resilience System{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}

    <!-- Prevent double submit: disable buttons on form submit, re-enable if form doesn't navigate away -->
    <script>
    (function() {
        function init() {
            document.body.addEventListener('submit', function(e) {
                var form = e.target;
                if (form.tagName !== 'FORM') return;
                var buttons = form.querySelectorAll('button[type="submit"], input[type="submit"]');
                var disabledList = [];
                buttons.forEach(function(btn) {
                    if (btn.disabled) return;
                    btn.disabled = true;
                    if (btn.tagName === 'BUTTON' && btn.dataset.disableText) {
                        btn.dataset.originalText = btn.innerHTML;
                        btn.innerHTML = btn.dataset.disableText;
                    }
                    disabledList.push(btn);
                });
                setTimeout(function() {
                    disabledList.forEach(function(btn) {
                        if (btn && btn.parentNode) {
                            btn.disabled = false;
                            if (btn.dataset.originalText) {
                                btn.innerHTML = btn.dataset.originalText;
                                delete btn.dataset.originalText;
                            }
                        }
                    });
                }, 4000);
            });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
